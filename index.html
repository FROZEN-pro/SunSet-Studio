<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunSet Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ========== DARK MODE ========== */
        body.dark-mode { background: #121212; color: #fff; }
        .dark-mode .login-container { background: rgba(0,0,0,0.70); color: #fff; }
        .dark-mode .login-input { background: #333; border-color: #666; color: #fff; }
        .dark-mode .app-container,
        .dark-mode .nav-tabs,
        .dark-mode .content-item,
        .dark-mode .profile-menu,
        .dark-mode .announcement-item { background: #2a2a2a; color: #eee; }
        .dark-mode .section-nav { background: #1e1e1e; }
        .dark-mode .nav-tab,
        .dark-mode .section-tab,
        .dark-mode .profile-menu-item,
        .dark-mode .content-title,
        .dark-mode .profile-name { color: #fff; }
        .dark-mode .content-meta { color: #bbb; }
        .dark-mode .bottom-nav { background: #1e1e1e; border-top: 1px solid #333; }
        .dark-mode .bottom-nav-item { color: #aaa; }
        .dark-mode .modal-content { background: #2a2a2a; color: #eee; }
        .dark-mode .search-input { background: rgba(255,255,255,0.15); color: #fff; }
        .dark-mode .search-input::placeholder { color: #ccc; }

        /* ========== LOADING SCREEN ========== */
        .loading-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-logo {
            width: 100px; height: 100px;
            border-radius: 50%; margin-bottom: 20px;
            object-fit: cover;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); opacity:1; }
            50% { transform: scale(1.1); opacity:0.8; }
        }
        .loading-text {
            color: white; font-size: 22px;
            font-weight: 700; letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .loading-bar {
            width: 180px; height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px; overflow: hidden;
        }
        .loading-fill {
            height: 100%; background: white;
            border-radius: 2px;
            animation: loadfill 2s ease-in-out forwards;
        }
        @keyframes loadfill { from { width:0%; } to { width:100%; } }

        /* ========== LOGIN ========== */
        .login-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            background: url('https://i.ibb.co/23d8q2jn/1434178-adapted-1080x2400-1759722185.jpg') center/cover no-repeat;
        }
        /* ⬆️ loginBg Sheets'dan o'zgartiriladi — style attr orqali */
        .login-container {
            background: rgba(255,255,255,0.60);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
            min-width: 320px;
            backdrop-filter: blur(4px);
        }
        .logo-text {
            font-size: 32px; font-weight: 700;
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px; letter-spacing: 2px;
        }
        .logo-subtitle {
            font-size: 13px; color: #888;
            margin-bottom: 30px; letter-spacing: 1px;
        }
        .login-input {
            width: 100%; padding: 16px 20px;
            margin-bottom: 20px;
            border: 2px solid #E0E0E0;
            border-radius: 15px; font-size: 16px;
            background: #FAFAFA; transition: all 0.3s;
        }
        .login-input:focus {
            outline: none; border-color: #FF6B35;
            background: white; transform: translateY(-2px);
        }
        .login-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            color: white; border: none;
            border-radius: 15px; font-size: 17px;
            font-weight: 700; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .login-btn:active { transform: scale(0.97); }

        /* ========== APP ========== */
        .app-container {
            display: none;
            max-width: 420px;
            margin: 0 auto;
            background: #F8F9FA;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            display: flex; align-items: center;
            padding: 14px 16px;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            color: white;
            position: sticky; top: 0; z-index: 100;
        }
        .header-logo img {
            width: 42px; height: 42px;
            border-radius: 50%; margin-right: 10px;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.5);
        }
        .search-container { flex: 1; margin-right: 10px; }
        .search-input {
            width: 100%; padding: 10px 18px;
            border: none; border-radius: 25px;
            background: rgba(255,255,255,0.2);
            font-size: 14px; color: white;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.8); }
        .announcements-btn {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%;
            color: white; cursor: pointer;
            font-size: 20px; flex-shrink: 0;
        }

        /* NAV TABS */
        .nav-tabs {
            display: flex; background: white;
            padding: 0 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .nav-tab {
            flex: 1; padding: 16px 10px;
            background: none; border: none;
            font-size: 15px; font-weight: 700;
            cursor: pointer; color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s; text-transform: uppercase;
        }
        .nav-tab.active { color: #FF6B35; border-bottom-color: #FF6B35; }

        /* SECTION NAV */
        .section-nav {
            display: flex; margin: 16px;
            background: white; border-radius: 25px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .section-tab {
            flex: 1; padding: 12px 16px;
            background: none; border: none;
            border-radius: 20px; cursor: pointer;
            font-size: 13px; font-weight: 600;
            color: #999; transition: all 0.3s;
        }
        .section-tab.active {
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            color: white;
        }

        /* CONTENT GRID */
        .content-section { padding: 0 16px 100px; }
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .content-item {
            background: white; border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.09);
            transition: all 0.25s; cursor: pointer;
            position: relative;
        }
        .content-item:active { transform: scale(0.97); }
        .content-image {
            position: relative; width: 100%;
            padding-bottom: 133%; overflow: hidden;
        }
        .content-image img {
            position: absolute; top:0; left:0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }
        .content-item:hover .content-image img { transform: scale(1.04); }
        .card-like {
            position: absolute; top: 10px; right: 10px;
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            cursor: pointer; z-index: 10;
            transition: transform 0.2s;
        }
        .card-like:active { transform: scale(1.3); }
        .content-info { padding: 8px 10px 10px; }
        .content-title {
            font-size: 13px; font-weight: 700;
            margin-bottom: 5px; color: #333;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .content-meta {
            display: flex; justify-content: space-between;
            font-size: 11px; color: #888;
        }
        .content-rating { color: #FF6B35; font-weight: 700; }

        /* SKELETON */
        .skeleton {
            background: #e0e0e0;
            border-radius: 18px;
            height: 240px;
            animation: shimmer 1.4s infinite;
        }
        .dark-mode .skeleton { background: #333; }
        @keyframes shimmer {
            0%,100% { opacity:1; } 50% { opacity:0.5; }
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1/-1;
            text-align: center; padding: 60px 20px;
            color: #bbb;
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 420px;
            height: 68px; background: white;
            display: flex; justify-content: space-around;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            border-radius: 22px 22px 0 0;
        }
        .bottom-nav-item {
            flex: 1; text-align: center; padding: 6px;
            background: none; border: none;
            cursor: pointer; color: #aaa;
            font-size: 11px; font-weight: 600;
            transition: all 0.2s;
        }
        .bottom-nav-item.active { color: #FF6B35; }
        .bottom-nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }

        /* PAGE SECTIONS */
        .page-section { display: none; }
        .page-section.active { display: block; }
        .page-header {
            text-align: center; font-size: 20px;
            font-weight: 700; color: #FF6B35;
            padding: 24px 20px 10px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* PROFILE */
        .profile-section { padding: 16px; }
        .dark-mode-container {
            display: flex; align-items: center;
            justify-content: flex-end; padding: 8px 4px 16px;
        }
        .dark-mode-label { font-size: 11px; color: #888; margin-right: 10px; }
        .dark-mode-switch { position: relative; width: 44px; height: 24px; display: inline-block; }
        .dark-mode-switch input { opacity:0; width:0; height:0; }
        .slider {
            position: absolute; cursor: pointer;
            inset: 0; background: #ccc;
            border-radius: 24px; transition: .4s;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background: white; border-radius: 50%;
            transition: .4s;
        }
        input:checked + .slider { background: #FF6B35; }
        input:checked + .slider:before { transform: translateX(20px); }

        .profile-header { text-align: center; padding: 10px 0 24px; }
        .profile-logo {
            width: 120px; height: 120px;
            border-radius: 50%; margin-bottom: 12px;
            object-fit: cover;
            border: 4px solid #FF6B35;
        }
        .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .profile-tag { font-size: 13px; color: #999; }

        .profile-menu {
            background: white; border-radius: 20px;
            padding: 8px 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }
        .profile-menu-item {
            display: flex; align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer; font-size: 15px;
            font-weight: 600; color: #333;
            transition: all 0.2s;
        }
        .profile-menu-item:last-child { border-bottom: none; }
        .profile-menu-item:active { color: #FF6B35; padding-left: 6px; }
        .profile-menu-item .icon { font-size: 20px; margin-right: 14px; width: 26px; }
        .profile-menu-item .chevron { margin-left: auto; color: #ccc; }

        /* MODALS */
        .modal {
            display: none; position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .modal-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 92%; max-width: 380px;
            background: white; border-radius: 24px;
            padding: 28px 24px; max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translate(-50%, -40%); opacity:0; }
            to { transform: translate(-50%, -50%); opacity:1; }
        }
        .modal-header {
            text-align: center; font-size: 18px;
            font-weight: 700; color: #FF6B35;
            margin-bottom: 20px; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .close-modal {
            position: absolute; top: 14px; right: 18px;
            background: none; border: none;
            font-size: 26px; color: #bbb; cursor: pointer;
        }

        /* ANNOUNCEMENT ITEMS */
        .announcement-item {
            background: #FFF8F5; padding: 16px 18px;
            border-radius: 14px; margin-bottom: 12px;
            border-left: 4px solid #FF6B35;
        }
        .dark-mode .announcement-item { background: #1e1e1e; }
        .announcement-title {
            font-weight: 700; font-size: 15px;
            margin-bottom: 6px; color: #FF6B35;
        }
        .announcement-text { font-size: 13px; line-height: 1.5; color: #555; }
        .dark-mode .announcement-text { color: #bbb; }
        .announcement-date { font-size: 11px; color: #aaa; margin-top: 8px; }

        /* CONTENT DETAILS */
        .youtube-player {
            width: 100%; height: 220px;
            background: #000; margin-bottom: 16px;
            border-radius: 14px; overflow: hidden;
        }
        .content-details-title {
            font-size: 18px; font-weight: 700;
            text-align: center; margin-bottom: 6px;
        }
        .content-details-info {
            text-align: center; font-size: 13px;
            color: #888; margin-bottom: 4px;
        }
        .content-details-genre {
            text-align: center; font-size: 12px;
            color: #aaa; font-style: italic; margin-bottom: 14px;
        }
        .content-details-desc {
            font-size: 14px; line-height: 1.6;
            color: #555; margin-bottom: 16px;
        }
        .dark-mode .content-details-desc { color: #bbb; }
        .content-buttons {
            display: flex; align-items: center;
            gap: 12px; margin-top: 4px;
        }
        .like-icon {
            font-size: 30px; cursor: pointer;
            transition: transform 0.2s; flex-shrink: 0;
        }
        .like-icon:active { transform: scale(1.3); }
        .watch-btn {
            flex: 1; padding: 14px;
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            color: white; border: none;
            border-radius: 14px; font-size: 15px;
            font-weight: 700; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.5px;
        }
        .watch-btn:active { transform: scale(0.97); }

        /* SOCIAL / SUPPORT ITEMS */
        .link-item {
            display: flex; align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer; font-size: 15px;
            font-weight: 600; color: #333;
            transition: all 0.2s; text-decoration: none;
        }
        .dark-mode .link-item { color: #eee; border-bottom-color: #333; }
        .link-item:last-child { border-bottom: none; }
        .link-item:active { color: #FF6B35; }
        .link-item .icon { font-size: 20px; margin-right: 14px; width: 26px; }
        .link-item .chevron { margin-left: auto; color: #ccc; }

        /* NOTIFICATION */
        #notification {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white; padding: 12px 22px;
            border-radius: 30px; z-index: 1100;
            display: none; font-size: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            white-space: nowrap;
        }

        /* REFRESH BTN */
        .refresh-btn {
            display: block; margin: 0 auto 16px;
            padding: 10px 24px;
            background: none; border: 2px solid #FF6B35;
            border-radius: 20px; color: #FF6B35;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .refresh-btn:active {
            background: #FF6B35; color: white;
        }

        @media (max-width: 380px) {
            .youtube-player { height: 190px; }
            .content-title { font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- ====== LOADING SCREEN ====== -->
<div class="loading-screen" id="loadingScreen">
    <img class="loading-logo" src="https://i.ibb.co/h1BBhdh5/App-icon-for-Sun-Set.png" alt="Logo" id="loadingLogo">
    <div class="loading-text" id="loadingAppName">SunSet Studio</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- ====== LOGIN ====== -->
<div class="login-screen" id="loginScreen" style="display:none;">
    <div class="login-container">
        <h1 class="logo-text" id="loginTitle">SunSet Studio</h1>
        <p class="logo-subtitle">Multfilm & Anime Dunyosi</p>
        <input type="text" class="login-input" id="nameInput" placeholder="Ismingizni kiriting...">
        <button class="login-btn" onclick="handleLogin()">KIRISH</button>
    </div>
</div>

<!-- ====== MAIN APP ====== -->
<div class="app-container" id="appContainer">

    <!-- Header -->
    <div class="header" id="mainHeader">
        <div class="header-logo">
            <img src="https://i.ibb.co/h1BBhdh5/App-icon-for-Sun-Set.png" id="headerIcon" alt="Logo">
        </div>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Nima qidiramiz..." oninput="handleSearch()">
        </div>
        <button class="announcements-btn" onclick="showModal('announcementsModal')">📢</button>
    </div>

    <!-- MAIN PAGE -->
    <div class="page-section active" id="mainPage">
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchMainTab('multfilm', this)">MULTFILM</button>
            <button class="nav-tab" onclick="switchMainTab('anime', this)">ANIME</button>
        </div>
        <div class="content-section">
            <div class="section-nav">
                <button class="section-tab active" onclick="switchSectionTab('trending', this)">🔥 Trendda</button>
                <button class="section-tab" onclick="switchSectionTab('new', this)">✨ Yangi</button>
            </div>
            <button class="refresh-btn" onclick="refreshContent()">↻ Yangilash</button>
            <div class="content-grid" id="contentGrid">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </div>
    </div>

    <!-- FAVOURITES PAGE -->
    <div class="page-section" id="favouritesPage">
        <div class="page-header">❤️ FAVOURITES</div>
        <div class="content-section">
            <div class="content-grid" id="favouritesGrid"></div>
        </div>
    </div>

    <!-- PROFILE PAGE -->
    <div class="page-section" id="profilePage">
        <div class="profile-section">
            <div class="dark-mode-container">
                <span class="dark-mode-label">Dark Mode</span>
                <label class="dark-mode-switch">
                    <input type="checkbox" id="darkModeSwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="profile-header">
                <img class="profile-logo" src="https://i.ibb.co/h1BBhdh5/App-icon-for-Sun-Set.png" id="profileIcon" alt="Logo">
                <div class="profile-name" id="profileName">Foydalanuvchi</div>
                <div class="profile-tag">SunSet Studio a'zosi</div>
            </div>
            <div class="profile-menu">
                <div class="profile-menu-item" onclick="showPage('favourites')">
                    <span class="icon">❤️</span> FAVOURITES <span class="chevron">›</span>
                </div>
                <div class="profile-menu-item" onclick="showModal('announcementsModal')">
                    <span class="icon">📢</span> ANNOUNCEMENTS <span class="chevron">›</span>
                </div>
                <div class="profile-menu-item" onclick="showModal('socialModal')">
                    <span class="icon">🌐</span> SOCIAL PAGES <span class="chevron">›</span>
                </div>
                <div class="profile-menu-item" onclick="showModal('supportModal')">
                    <span class="icon">🛠️</span> SUPPORT <span class="chevron">›</span>
                </div>
                <div class="profile-menu-item" onclick="handleLogout()" style="color:#e74c3c;">
                    <span class="icon">🚪</span> LOG OUT <span class="chevron">›</span>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="bottom-nav-item active" onclick="showPage('main')">
            <span class="icon">🏠</span>MAIN
        </button>
        <button class="bottom-nav-item" onclick="showPage('favourites')">
            <span class="icon">❤️</span>FAVOURITES
        </button>
        <button class="bottom-nav-item" onclick="showPage('profile')">
            <span class="icon">👤</span>PROFILE
        </button>
    </div>
</div>

<!-- ====== CONTENT DETAILS MODAL ====== -->
<div class="modal" id="contentDetailsModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('contentDetailsModal')">×</button>
        <div class="youtube-player">
            <iframe id="youtubeIframe" width="100%" height="100%" src=""
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
        </div>
        <div class="content-details-title" id="detailTitle"></div>
        <div class="content-details-info" id="detailInfo"></div>
        <div class="content-details-genre" id="detailGenre"></div>
        <p class="content-details-desc" id="detailDesc"></p>
        <div class="content-buttons">
            <span class="like-icon" id="likeIcon" onclick="toggleLikeFromDetails()">🖤</span>
            <button class="watch-btn" onclick="watchContent()">▶ Ko'rish</button>
        </div>
    </div>
</div>

<!-- ====== ANNOUNCEMENTS MODAL ====== -->
<div class="modal" id="announcementsModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('announcementsModal')">×</button>
        <div class="modal-header">📢 E'LONLAR</div>
        <div id="announcementsContainer">
            <div class="skeleton" style="height:80px;margin-bottom:12px;border-radius:14px;"></div>
            <div class="skeleton" style="height:80px;border-radius:14px;"></div>
        </div>
    </div>
</div>

<!-- ====== SOCIAL MODAL ====== -->
<div class="modal" id="socialModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('socialModal')">×</button>
        <div class="modal-header">🌐 SOCIAL PAGES</div>
        <div id="socialContainer">
            <div class="skeleton" style="height:50px;margin-bottom:10px;border-radius:12px;"></div>
            <div class="skeleton" style="height:50px;border-radius:12px;"></div>
        </div>
    </div>
</div>

<!-- ====== SUPPORT MODAL ====== -->
<div class="modal" id="supportModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('supportModal')">×</button>
        <div class="modal-header">🛠️ SUPPORT</div>
        <div id="supportContainer">
            <div class="skeleton" style="height:50px;margin-bottom:10px;border-radius:12px;"></div>
            <div class="skeleton" style="height:50px;border-radius:12px;"></div>
        </div>
    </div>
</div>

<!-- NOTIFICATION -->
<div id="notification"></div>

<script>
// ==================== CONFIG ====================
const SHEETS_API = 'https://script.google.com/macros/s/AKfycbyJbK9CgqI14BjgnvA7vIzQ-byIQm_g3EFUZq1dinYXSQmw5ySQCS8e0X54HA4ZLlFR/exec';

// ==================== STATE ====================
let currentMainTab = 'multfilm';
let currentSection  = 'trending';
let allContent      = [];
let favourites      = JSON.parse(localStorage.getItem('ss_favourites') || '[]');
let currentContent  = null;
let darkMode        = localStorage.getItem('ss_darkMode') === 'enabled';
let isSearching     = false;

// Sheets'dan kelgan ma'lumotlar
let sheetsData = {
    contents     : [],
    announcements: [],
    settings     : {},
    social       : [],
    support      : []
};

// ==================== TELEGRAM ====================
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ==================== UTILS ====================
function getEmbedUrl(url) {
    if (!url) return '';
    if (url.includes('/embed/')) return url;
    const v = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
    if (v) return `https://www.youtube.com/embed/${v[1]}`;
    const y = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
    if (y) return `https://www.youtube.com/embed/${y[1]}`;
    return url;
}

function showNotification(msg) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.display = 'block';
    clearTimeout(n._t);
    n._t = setTimeout(() => n.style.display = 'none', 2800);
}

function saveFavourites() {
    localStorage.setItem('ss_favourites', JSON.stringify(favourites));
}

function toggleFavourite(item) {
    if (!item?.id) return false;
    const idx = favourites.findIndex(f => f.id === item.id);
    if (idx === -1) {
        favourites.push(item);
        showNotification('❤️ Sevimlilarga qo\'shildi!');
    } else {
        favourites.splice(idx, 1);
        showNotification('🖤 Sevimlilardan olib tashlandi!');
    }
    saveFavourites();
    return idx === -1;
}

// ==================== FETCH FROM SHEETS ====================
async function fetchSheet(sheetName) {
    try {
        const res = await fetch(`${SHEETS_API}?sheet=${sheetName}`);
        if (!res.ok) throw new Error('Network error');
        return await res.json();
    } catch (e) {
        console.warn(`[SunSet] ${sheetName} yuklanmadi:`, e.message);
        return [];
    }
}

async function loadAllSheets() {
    // Parallel fetch
    const [contents, announcements, settingsArr, social, support] = await Promise.all([
        fetchSheet('Contents'),
        fetchSheet('Announcements'),
        fetchSheet('Settings'),
        fetchSheet('Social'),
        fetchSheet('Support')
    ]);

    // Contents
    sheetsData.contents = (contents || []).filter(r => r.id && r.title);
    allContent = sheetsData.contents;

    // Announcements — faqat active=TRUE bo'lganlar
    sheetsData.announcements = (announcements || []).filter(r =>
        String(r.active).toUpperCase() !== 'FALSE' && r.title
    );

    // Settings — key-value juftligi
    sheetsData.settings = {};
    (settingsArr || []).forEach(r => {
        if (r.key) sheetsData.settings[r.key] = r.value;
    });

    // Social & Support — active=TRUE
    sheetsData.social   = (social   || []).filter(r => String(r.active).toUpperCase() !== 'FALSE' && r.name);
    sheetsData.support  = (support  || []).filter(r => String(r.active).toUpperCase() !== 'FALSE' && r.name);

    applySettings();
    renderAnnouncements();
    renderSocial();
    renderSupport();
}

// ==================== APPLY SETTINGS ====================
function applySettings() {
    const s = sheetsData.settings;

    // Login background
    if (s.loginBg) {
        document.getElementById('loginScreen').style.backgroundImage = `url('${s.loginBg}')`;
    }

    // Logo
    const logoUrl = s.logoUrl || 'https://i.ibb.co/h1BBhdh5/App-icon-for-Sun-Set.png';
    ['headerIcon','profileIcon','loadingLogo'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.src = logoUrl;
    });
    // Profile logo (img.profile-logo)
    const pLogo = document.querySelector('.profile-logo');
    if (pLogo) pLogo.src = logoUrl;

    // App name
    const appName = s.appName || 'SunSet Studio';
    document.title = appName;
    const lTitle = document.getElementById('loginTitle');
    if (lTitle) lTitle.textContent = appName;
    const laName = document.getElementById('loadingAppName');
    if (laName) laName.textContent = appName;
}

// ==================== RENDER CONTENTS ====================
function createContentItem(item) {
    if (!item?.id) return '';
    const isLiked = favourites.some(f => f.id == item.id);
    const fallbackImg = 'https://i.ibb.co/h1BBhdh5/App-icon-for-Sun-Set.png';
    return `
    <div class="content-item" onclick="showContentDetails('${item.id}')">
        <div class="content-image">
            <img src="${item.imageUrl || fallbackImg}"
                 onerror="this.src='${fallbackImg}'"
                 alt="${item.title}" loading="lazy">
            <span class="card-like"
                  onclick="event.stopImmediatePropagation(); toggleLikeFromCard('${item.id}')">
                ${isLiked ? '❤️' : '🖤'}
            </span>
        </div>
        <div class="content-info">
            <div class="content-title">${item.title}</div>
            <div class="content-meta">
                <span>${item.year || ''}</span>
                <span class="content-rating">⭐ ${item.rating || ''}</span>
            </div>
        </div>
    </div>`;
}

function getFilteredContent() {
    return allContent.filter(item => {
        const typeMatch    = String(item.type || '').toLowerCase() === currentMainTab;
        const sectionMatch = String(item.section || '').toLowerCase() === currentSection;
        return typeMatch && sectionMatch;
    });
}

function loadContent() {
    const grid = document.getElementById('contentGrid');
    const data = getFilteredContent();
    if (data.length === 0) {
        grid.innerHTML = `
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>Hozircha kontent yo'q</p>
        </div>`;
    } else {
        grid.innerHTML = data.map(createContentItem).join('');
    }
}

function loadFavourites() {
    const grid = document.getElementById('favouritesGrid');
    if (favourites.length === 0) {
        grid.innerHTML = `
        <div class="empty-state">
            <div class="empty-icon">💔</div>
            <p>Sevimlilar bo'sh.<br>❤️ tugmasini bosing!</p>
        </div>`;
    } else {
        grid.innerHTML = favourites.map(createContentItem).join('');
    }
}

async function refreshContent() {
    const grid = document.getElementById('contentGrid');
    grid.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    await loadAllSheets();
    loadContent();
    showNotification('✅ Yangilandi!');
}

// ==================== RENDER ANNOUNCEMENTS ====================
function renderAnnouncements() {
    const container = document.getElementById('announcementsContainer');
    const data = sheetsData.announcements;
    if (!data.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>E\'lonlar yo\'q</p></div>';
        return;
    }
    container.innerHTML = data.map(a => `
    <div class="announcement-item">
        <div class="announcement-title">${a.title || ''}</div>
        <div class="announcement-text">${a.text || ''}</div>
        ${a.date ? `<div class="announcement-date">📅 ${a.date}</div>` : ''}
    </div>`).join('');
}

// ==================== RENDER SOCIAL ====================
function renderSocial() {
    const container = document.getElementById('socialContainer');
    const data = sheetsData.social;
    if (!data.length) {
        container.innerHTML = '<div class="empty-state"><p>Havolalar yo\'q</p></div>';
        return;
    }
    container.innerHTML = data.map(s => `
    <a class="link-item" href="${s.url || '#'}" target="_blank" rel="noopener">
        <span class="icon">${s.icon || '🔗'}</span>
        ${s.name}
        <span class="chevron">›</span>
    </a>`).join('');
}

// ==================== RENDER SUPPORT ====================
function renderSupport() {
    const container = document.getElementById('supportContainer');
    const data = sheetsData.support;
    if (!data.length) {
        container.innerHTML = '<div class="empty-state"><p>Ma\'lumot yo\'q</p></div>';
        return;
    }
    container.innerHTML = data.map(s => `
    <a class="link-item" href="${s.url || '#'}" target="_blank" rel="noopener">
        <span class="icon">${s.icon || '👤'}</span>
        ${s.name}
        <span class="chevron">›</span>
    </a>`).join('');
}

// ==================== CONTENT DETAILS ====================
function showContentDetails(id) {
    currentContent = allContent.find(item => String(item.id) === String(id));
    if (!currentContent) return;

    document.getElementById('detailTitle').textContent = currentContent.title || '';
    document.getElementById('detailInfo').innerHTML =
        `${currentContent.year || ''} • ⭐ ${currentContent.rating || ''}`;
    document.getElementById('detailGenre').textContent =
        currentContent.genres ? `Janr: ${currentContent.genres}` : '';
    document.getElementById('detailDesc').textContent = currentContent.description || '';

    const iframe = document.getElementById('youtubeIframe');
    iframe.src = getEmbedUrl(currentContent.videoUrl || '');

    updateLikeIcon();
    showModal('contentDetailsModal');
}

function updateLikeIcon() {
    const icon = document.getElementById('likeIcon');
    if (!icon || !currentContent) return;
    icon.textContent = favourites.some(f => f.id == currentContent.id) ? '❤️' : '🖤';
}

function toggleLikeFromDetails() {
    if (!currentContent) return;
    toggleFavourite(currentContent);
    updateLikeIcon();
    if (document.getElementById('favouritesPage').classList.contains('active')) loadFavourites();
}

function toggleLikeFromCard(id) {
    const item = allContent.find(i => String(i.id) === String(id));
    if (!item) return;
    toggleFavourite(item);
    if (isSearching) handleSearch(); else loadContent();
    if (document.getElementById('favouritesPage').classList.contains('active')) loadFavourites();
}

function watchContent() {
    const link = currentContent?.watchLink || currentContent?.videoUrl;
    if (link) {
        closeModal('contentDetailsModal');
        window.open(link, '_blank');
    } else {
        showNotification('⚠️ Havola topilmadi');
    }
}

// ==================== NAVIGATION ====================
function switchMainTab(tab, el) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentMainTab = tab;
    isSearching = false;
    document.getElementById('searchInput').value = '';
    loadContent();
}

function switchSectionTab(section, el) {
    document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentSection = section;
    isSearching = false;
    loadContent();
}

function showPage(page) {
    const showHeader = page === 'main';
    document.getElementById('mainHeader').style.display = showHeader ? 'flex' : 'none';

    document.querySelectorAll('.bottom-nav-item').forEach((item, i) => {
        item.classList.toggle('active',
            (page==='main' && i===0) ||
            (page==='favourites' && i===1) ||
            (page==='profile' && i===2)
        );
    });

    document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(page + 'Page');
    if (target) target.classList.add('active');

    if (page === 'favourites') loadFavourites();
}

// ==================== MODAL ====================
function showModal(id) {
    document.getElementById(id).style.display = 'block';
}
function closeModal(id) {
    document.getElementById(id).style.display = 'none';
    if (id === 'contentDetailsModal') {
        document.getElementById('youtubeIframe').src = '';
    }
}

// ==================== SEARCH ====================
function handleSearch() {
    const term = document.getElementById('searchInput').value.trim().toLowerCase();
    const grid = document.getElementById('contentGrid');
    if (!term) { isSearching = false; loadContent(); return; }
    isSearching = true;
    const filtered = allContent.filter(i => i.title?.toLowerCase().includes(term));
    grid.innerHTML = filtered.length
        ? filtered.map(createContentItem).join('')
        : `<div class="empty-state"><div class="empty-icon">🔍</div><p>Hech narsa topilmadi</p></div>`;
}

// ==================== DARK MODE ====================
function toggleDarkMode() {
    darkMode = !darkMode;
    document.body.classList.toggle('dark-mode', darkMode);
    localStorage.setItem('ss_darkMode', darkMode ? 'enabled' : 'disabled');
}

// ==================== AUTH ====================
function handleLogin() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name || name.length < 2) {
        showNotification('⚠️ Ism kamida 2 ta harf bo\'lishi kerak!');
        return;
    }
    localStorage.setItem('ss_userName', name);
    document.getElementById('profileName').textContent = name;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    showPage('main');
    loadContent();
}

function handleLogout() {
    if (confirm('Chiqishni xohlaysizmi?')) {
        localStorage.removeItem('ss_userName');
        location.reload();
    }
}

function checkLogin() {
    const saved = localStorage.getItem('ss_userName');
    if (saved) {
        document.getElementById('profileName').textContent = saved;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        return true;
    }
    return false;
}

// ==================== INIT ====================
window.onload = async function () {
    // Dark mode
    if (darkMode) {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeSwitch').checked = true;
    }
    document.getElementById('darkModeSwitch').addEventListener('change', toggleDarkMode);

    // Enter on login
    document.getElementById('nameInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
    });

    // Close modal on outside click
    window.addEventListener('click', e => {
        if (e.target.classList.contains('modal')) closeModal(e.target.id);
    });

    // Load all data from Sheets
    await loadAllSheets();

    // Hide loading, show login or app
    setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hidden');
        if (!checkLogin()) {
            document.getElementById('loginScreen').style.display = 'flex';
        } else {
            loadContent();
        }
    }, 2200);
};
</script>
</body>
</html>
